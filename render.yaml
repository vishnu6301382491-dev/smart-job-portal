services:
  - type: web
    name: smart-job-portal-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: smart_job_portal
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
